trial_id: T07_window_2024_plus_weight
description: "学習窓 2024-01〜 + 直近6ヶ月を2倍重み（T01 + recency の複合）"
hypothesis: |
  T01（窓 2024-01〜）と T03（recency weighting）が個別に効くなら、
  両者の複合で相乗効果が出るかを検証する。窓は 2024-01〜 に短縮した上で、
  さらに直近 6 ヶ月のみ weight=2.0 で強調する。

training:
  train_start_year: 2024
  train_start_month: 1
  sample_weight:
    mode: recency
    recency_months: 6
    recency_weight: 2.0

walkforward:
  start: "2025-05"
  end: "2026-04"
  retrain_interval: 3
  real_odds: true

strategy:
  prob_threshold: 0.07
  ev_threshold: 2.0
  min_odds: 100.0
  exclude_courses: []
  exclude_stadiums: [2, 3, 4, 9, 11, 14, 16, 17, 21, 23]
  bet_amount: 100
  max_bets: 5
  bet_type: trifecta
