trial_id: T03_sample_weight_recency
description: "2023〜 の広い学習窓 + 直近12ヶ月を3倍重み（recency weighting）"
hypothesis: |
  BET_RULE_REVIEW §32 候補 2。学習窓は 2023-01〜 のまま広く確保しつつ、
  ref_date（学習期間末月末）から直近12ヶ月のサンプルを 3.0 倍に重み付けする
  ことで、古いデータを完全に捨てず直近の分布を優先させる折衷案。

training:
  train_start_year: 2023
  train_start_month: 1
  sample_weight:
    mode: recency
    recency_months: 12
    recency_weight: 3.0

walkforward:
  start: "2025-05"
  end: "2026-04"
  retrain_interval: 3
  real_odds: true

strategy:
  prob_threshold: 0.07
  ev_threshold: 2.0
  min_odds: 100.0
  exclude_courses: []
  exclude_stadiums: [2, 3, 4, 9, 11, 14, 16, 17, 21, 23]
  bet_amount: 100
  max_bets: 5
  bet_type: trifecta
