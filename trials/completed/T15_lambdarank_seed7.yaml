trial_id: T15_lambdarank_seed7
description: "T13 と同設定 + seed=7（フェーズ 6 撤退判定の seed 反復補強、案 C）"
hypothesis: |
  T13_lambdarank (seed=42) は ROI=-7.1% で verdict=fail。本 trial は T14 (seed=123)
  と合わせて seed 反復 3 本で「lambdarank では実運用再開条件は達成できない」ことを
  ROI 平均と bootstrap CI で確証する。

training:
  train_start_year: 2023
  train_start_month: 1
  sample_weight:
    mode: null

lgb_params:
  objective: lambdarank
  metric: ndcg
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 50
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  label_gain: [0, 1, 3, 7, 15, 31]
  ndcg_eval_at: [1, 3]
  seed: 7
  bagging_seed: 7
  feature_fraction_seed: 7
  data_random_seed: 7

walkforward:
  start: "2025-05"
  end: "2026-04"
  retrain_interval: 3
  real_odds: true

strategy:
  prob_threshold: 0.07
  ev_threshold: 2.0
  min_odds: 100.0
  exclude_courses: []
  exclude_stadiums: [2, 3, 4, 9, 11, 14, 16, 17, 21, 23]
  bet_amount: 100
  max_bets: 5
  bet_type: trifecta
