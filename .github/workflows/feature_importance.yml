name: Feature Importance & SHAP

on:
  workflow_dispatch:
    inputs:
      year:
        description: '検証データの年（モデルを評価する月）'
        required: true
        default: '2025'
      month:
        description: '検証データの月 (1-12)'
        required: true
        default: '12'
      no_shap:
        description: 'SHAP計算をスキップ（高速化）'
        required: false
        default: 'false'
        type: boolean

jobs:
  feature-importance:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # SHAP計算込みで最大2時間

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      # K/B ファイルキャッシュ（検証データのダウンロードを高速化）
      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.year }}-${{ inputs.month }}-
            kbfile-${{ inputs.year }}-

      # GitHub Releases から最新モデルをダウンロード
      - name: Download latest model
        run: python ml/src/scripts/download_model.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run feature importance analysis
        run: |
          NO_SHAP_FLAG=""
          if [ "${{ inputs.no_shap }}" == "true" ]; then
            NO_SHAP_FLAG="--no-shap"
          fi
          python ml/src/scripts/run_feature_importance.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            $NO_SHAP_FLAG

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-importance-${{ inputs.year }}-${{ inputs.month }}-run${{ github.run_number }}
          path: |
            artifacts/feature_importance_*.csv
            artifacts/feature_importance_*.png
            artifacts/shap_*.csv
            artifacts/shap_*.png
          retention-days: 90
