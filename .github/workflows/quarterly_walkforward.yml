name: Quarterly Walk-Forward

on:
  schedule:
    # 四半期ごと: 4/1, 7/1, 10/1, 1/1 の 01:00 UTC（JST 10:00）
    # auto_backtest_loop（00:00）の後に実行
    - cron: "0 1 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      end_month:
        description: '終了月 (YYYY-MM)。省略時は前月'
        required: false
        default: ''
      window_months:
        description: '遡る月数（デフォルト: 6）'
        required: false
        default: '6'
      prob_threshold:
        description: '的中確率閾値'
        required: false
        default: '0.07'
      ev_threshold:
        description: 'EV閾値'
        required: false
        default: '2.0'
      exclude_courses:
        description: '除外する1着艇番（スペース区切り）'
        required: false
        default: '2 4 5'
      min_odds:
        description: '購入オッズ下限'
        required: false
        default: '100'
      exclude_stadiums:
        description: '除外する場ID（スペース区切り）'
        required: false
        default: '11'

jobs:
  quarterly-walkforward:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine period
        id: period
        run: |
          WINDOW="${{ inputs.window_months || '6' }}"

          if [ -n "${{ inputs.end_month }}" ]; then
            END_MONTH="${{ inputs.end_month }}"
          else
            # 前月を終了月とする
            END_MONTH=$(date -d "$(date +%Y-%m-01) -1 day" +%Y-%m)
          fi

          # 開始月 = 終了月 - (WINDOW-1) ヶ月
          END_YEAR=$(echo $END_MONTH | cut -d'-' -f1)
          END_MON=$(echo $END_MONTH | cut -d'-' -f2 | sed 's/^0//')
          START_DATE=$(date -d "${END_YEAR}-${END_MON}-01 -$((WINDOW - 1)) months" +%Y-%m)

          echo "start=${START_DATE}" >> $GITHUB_OUTPUT
          echo "end=${END_MONTH}" >> $GITHUB_OUTPUT
          echo "window=${WINDOW}" >> $GITHUB_OUTPUT
          echo "[quarterly-wf] period: ${START_DATE} 〜 ${END_MONTH} (${WINDOW}ヶ月)"

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      # オッズ parquet キャッシュ
      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-v2-${{ steps.period.outputs.start }}-${{ steps.period.outputs.end }}-trifecta-${{ github.run_id }}
          restore-keys: |
            odds-v2-${{ steps.period.outputs.start }}-${{ steps.period.outputs.end }}-trifecta-
            odds-v2-${{ steps.period.outputs.start }}-${{ steps.period.outputs.end }}-
            odds-v2-${{ steps.period.outputs.start }}-
            odds-v2-

      # K/B ファイルキャッシュ
      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ steps.period.outputs.start }}-${{ steps.period.outputs.end }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ steps.period.outputs.start }}-${{ steps.period.outputs.end }}-
            kbfile-${{ steps.period.outputs.start }}-

      - name: Run quarterly Walk-Forward
        run: |
          EXCLUDE_COURSES_FLAG=""
          if [ -n "${{ inputs.exclude_courses || '2 4 5' }}" ]; then
            EXCLUDE_COURSES_FLAG="--exclude-courses ${{ inputs.exclude_courses || '2 4 5' }}"
          fi

          MIN_ODDS_FLAG=""
          if [ -n "${{ inputs.min_odds || '100' }}" ]; then
            MIN_ODDS_FLAG="--min-odds ${{ inputs.min_odds || '100' }}"
          fi

          EXCLUDE_STADIUMS_FLAG=""
          if [ -n "${{ inputs.exclude_stadiums || '11' }}" ]; then
            EXCLUDE_STADIUMS_FLAG="--exclude-stadiums ${{ inputs.exclude_stadiums || '11' }}"
          fi

          python ml/src/scripts/run_walkforward.py \
            --start "${{ steps.period.outputs.start }}" \
            --end "${{ steps.period.outputs.end }}" \
            --real-odds \
            --retrain \
            --prob-threshold ${{ inputs.prob_threshold || '0.07' }} \
            --ev-threshold ${{ inputs.ev_threshold || '2.0' }} \
            $EXCLUDE_COURSES_FLAG \
            $MIN_ODDS_FLAG \
            $EXCLUDE_STADIUMS_FLAG
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 各月の gate_check を走らせて kpi_history を更新
      - name: Run gate check for each month
        run: |
          START="${{ steps.period.outputs.start }}"
          END="${{ steps.period.outputs.end }}"
          CURRENT="$START"
          while true; do
            YEAR=$(echo $CURRENT | cut -d'-' -f1)
            MON=$(echo $CURRENT | cut -d'-' -f2 | sed 's/^0//')
            YYYYMM="${YEAR}$(printf '%02d' ${MON})"
            CSV="artifacts/backtest_${YYYYMM}.csv"
            if [ -f "$CSV" ]; then
              echo "[quarterly-wf] gate check: ${CURRENT}"
              python ml/src/scripts/run_gate_check.py \
                --year ${YEAR} --month ${MON} \
                --csv "$CSV" || true
            fi
            if [ "$CURRENT" = "$END" ]; then
              break
            fi
            CURRENT=$(date -d "${YEAR}-${MON}-01 +1 month" +%Y-%m)
          done

      # kpi_history と gate_result を commit
      - name: Commit KPI updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/kpi_history.jsonl artifacts/gate_result_*.json || true
          if git diff --cached --quiet; then
            echo "[quarterly-wf] No changes to commit"
          else
            git commit -m "chore(quarterly-wf): KPI history ${{ steps.period.outputs.start }}~${{ steps.period.outputs.end }}"
            git push
          fi

      - name: Upload Walk-Forward results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarterly-wf-${{ steps.period.outputs.start }}-${{ steps.period.outputs.end }}-run${{ github.run_number }}
          path: |
            artifacts/walkforward_*.csv
            artifacts/backtest_*.csv
            artifacts/gate_result_*.json
            artifacts/kpi_history.jsonl
            data/odds/odds_*.parquet
          retention-days: 90

      # Walk-Forward の集計サマリを Job Summary に出力
      - name: Output summary
        if: always()
        run: |
          echo "## Quarterly Walk-Forward: ${{ steps.period.outputs.start }} 〜 ${{ steps.period.outputs.end }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f artifacts/kpi_history.jsonl ]; then
            python - << 'PYEOF'
          import json, sys
          from pathlib import Path
          rows = [json.loads(l) for l in Path("artifacts/kpi_history.jsonl").read_text().splitlines() if l.strip()]
          rows = rows[-6:]  # 直近 6 ヶ月
          print("| 月 | ROI | ベット | 的中 | ゾーン |")
          print("|-----|-----|------|-----|------|")
          for r in rows:
              print(f"| {r['period']} | {r['roi_pct']:+.1f}% | {r['total_bets']:,} | {r['wins']} | {r['zone']} |")
          PYEOF
          fi >> $GITHUB_STEP_SUMMARY
