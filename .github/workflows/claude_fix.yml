name: Inner Loop Analysis (Claude Orchestrator用)

# Claude がオーケストレーターとしてこのワークフローをキックし、
# 結果 artifacts を取得して分析・対策・再実行を判断する。
#
# 使い方（Claude から gh CLI で実行）:
#   gh workflow run claude_fix.yml -f year=2025 -f month=12
#   gh run watch <run-id>
#   gh run download <run-id> -D /tmp/results

on:
  workflow_dispatch:
    inputs:
      year:
        description: '対象年'
        required: true
        default: '2025'
      month:
        description: '対象月 (1-12)'
        required: true
        default: '12'
      prob_threshold:
        description: '確率閾値（例: 0.07）'
        required: false
        default: '0.07'
      ev_threshold:
        description: 'EV閾値（例: 2.0）'
        required: false
        default: '2.0'
      exclude_courses:
        description: '除外コース（スペース区切り、例: "2"）'
        required: false
        default: '2'
      min_odds:
        description: '最低オッズ（例: 100）'
        required: false
        default: '100'
      exclude_stadiums:
        description: '除外場ID（スペース区切り、例: "11"）'
        required: false
        default: '11'
      retrain:
        description: 'モデルを再学習する'
        required: false
        default: false
        type: boolean
      label:
        description: 'ラン識別ラベル（baseline / candidate など）'
        required: false
        default: 'baseline'

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r ml/requirements.txt
          pip install pyyaml

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-v2-${{ inputs.year }}-${{ inputs.month }}-trifecta-${{ github.run_id }}
          restore-keys: |
            odds-v2-${{ inputs.year }}-${{ inputs.month }}-trifecta-
            odds-v2-${{ inputs.year }}-${{ inputs.month }}-

      - name: Download latest model
        id: download_model
        run: python ml/src/scripts/download_model.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ── 1. バックテスト ────────────────────────────────────────────────
      - name: Run backtest
        run: |
          RETRAIN_FLAG=""
          if [ "${{ inputs.retrain }}" == "true" ] || [ "${{ steps.download_model.outcome }}" != "success" ]; then
            RETRAIN_FLAG="--retrain"
          fi

          EXCLUDE_COURSES_FLAG=""
          if [ -n "${{ inputs.exclude_courses }}" ]; then
            EXCLUDE_COURSES_FLAG="--exclude-courses ${{ inputs.exclude_courses }}"
          fi

          EXCLUDE_STADIUMS_FLAG=""
          if [ -n "${{ inputs.exclude_stadiums }}" ]; then
            EXCLUDE_STADIUMS_FLAG="--exclude-stadiums ${{ inputs.exclude_stadiums }}"
          fi

          YYYYMM="${{ inputs.year }}$(printf '%02d' ${{ inputs.month }})"

          python ml/src/scripts/run_backtest.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            --real-odds \
            --prob-threshold ${{ inputs.prob_threshold }} \
            --ev-threshold ${{ inputs.ev_threshold }} \
            --exclude-courses ${{ inputs.exclude_courses }} \
            --min-odds ${{ inputs.min_odds }} \
            $EXCLUDE_STADIUMS_FLAG \
            $RETRAIN_FLAG \
            --output artifacts/backtest_${YYYYMM}_${{ inputs.label }}.csv
        env:
          DATABASE_URL: ${{ secrets.BACKTEST_DATABASE_URL }}

      # ── 2. 評価ゲート ──────────────────────────────────────────────────
      - name: Run gate check
        id: gate
        run: |
          YYYYMM="${{ inputs.year }}$(printf '%02d' ${{ inputs.month }})"
          python ml/src/scripts/run_gate_check.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            --csv artifacts/backtest_${YYYYMM}_${{ inputs.label }}.csv \
            --no-append \
            2>&1 | tee artifacts/gate_result_${YYYYMM}_${{ inputs.label }}.txt

          GATE_JSON="artifacts/gate_result_${YYYYMM}.json"
          if [ -f "$GATE_JSON" ]; then
            ZONE=$(python -c "import json; d=json.load(open('${GATE_JSON}')); print(d['zone'])")
            ROI=$(python -c "import json; d=json.load(open('${GATE_JSON}')); print(d['roi_pct'])")
            echo "zone=${ZONE}" >> $GITHUB_OUTPUT
            echo "roi=${ROI}" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ── 3. セグメント分析（コース/場/確率帯/EV帯 別 ROI）──────────────
      - name: Run segment analysis
        run: |
          YYYYMM="${{ inputs.year }}$(printf '%02d' ${{ inputs.month }})"
          COMBO_FILE="artifacts/combos_${YYYYMM}.csv"

          if [ -f "$COMBO_FILE" ]; then
            python ml/src/scripts/run_segment_analysis.py \
              --combos-csv "$COMBO_FILE" \
              --prob-threshold ${{ inputs.prob_threshold }} \
              --ev-threshold ${{ inputs.ev_threshold }} \
              2>&1 | tee artifacts/segment_${YYYYMM}_${{ inputs.label }}.txt
          else
            python ml/src/scripts/run_segment_analysis.py \
              --year ${{ inputs.year }} \
              --month ${{ inputs.month }} \
              --prob-threshold ${{ inputs.prob_threshold }} \
              --ev-threshold ${{ inputs.ev_threshold }} \
              --real-odds \
              2>&1 | tee artifacts/segment_${YYYYMM}_${{ inputs.label }}.txt
          fi
        continue-on-error: true

      # ── 4. すべての結果を artifacts にアップロード（Claude がダウンロード）
      - name: Upload all results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inner-loop-${{ inputs.year }}-${{ inputs.month }}-${{ inputs.label }}-run${{ github.run_number }}
          path: |
            artifacts/backtest_*.csv
            artifacts/gate_result_*.json
            artifacts/gate_result_*.txt
            artifacts/segment_*.txt
            artifacts/segment_*.csv
            artifacts/combos_*.csv
          retention-days: 30
