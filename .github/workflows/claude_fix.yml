name: Inner Loop Analysis (Claude Orchestrator用)

# Claude がオーケストレーターとしてこのワークフローをキックし、
# 結果 artifacts を取得して分析・対策・再実行を判断する。
#
# 使い方（Claude から gh CLI で実行）:
#   gh workflow run claude_fix.yml -f year=2025 -f month=12 -f label=baseline
#   gh run watch <run-id>
#   gh run download <run-id> -D /tmp/results
#
# 方針（2026-04-24 レビュー結果 C3/C4/C5 反映）:
#   - 戦略パラメータはすべて ml/configs/strategy_default.yaml から読み込む。
#   - CLI 引数で閾値を差し替えることは廃止（CODEOWNERS 迂回の遮断）。
#   - パラメータを変えたい場合は ml/configs/strategy_default.yaml を書き換えてから
#     このワークフローをキックすること。

on:
  workflow_dispatch:
    inputs:
      year:
        description: '対象年'
        required: true
        default: '2025'
      month:
        description: '対象月 (1-12)'
        required: true
        default: '12'
      retrain:
        description: 'モデルを再学習する'
        required: false
        default: false
        type: boolean
      label:
        description: 'ラン識別ラベル（baseline / candidate-iter1 など）'
        required: false
        default: 'baseline'

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    permissions:
      contents: read

    env:
      STRATEGY_CONFIG: ml/configs/strategy_default.yaml

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r ml/requirements.txt
          pip install pyyaml

      - name: Extract thresholds from strategy YAML
        id: strategy
        run: |
          PROB=$(python -c "import yaml; print(yaml.safe_load(open('${STRATEGY_CONFIG}'))['filters']['prob_threshold'])")
          EV=$(python -c "import yaml; print(yaml.safe_load(open('${STRATEGY_CONFIG}'))['filters']['ev_threshold'])")
          echo "prob_threshold=${PROB}" >> $GITHUB_OUTPUT
          echo "ev_threshold=${EV}" >> $GITHUB_OUTPUT
          echo "[strategy] prob=${PROB} ev=${EV} (from ${STRATEGY_CONFIG})"

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-v2-${{ inputs.year }}-${{ inputs.month }}-trifecta-${{ github.run_id }}
          restore-keys: |
            odds-v2-${{ inputs.year }}-${{ inputs.month }}-trifecta-
            odds-v2-${{ inputs.year }}-${{ inputs.month }}-

      - name: Download latest model
        id: download_model
        run: python ml/src/scripts/download_model.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ── 1. バックテスト ────────────────────────────────────────────────
      - name: Run backtest
        run: |
          RETRAIN_FLAG=""
          if [ "${{ inputs.retrain }}" == "true" ] || [ "${{ steps.download_model.outcome }}" != "success" ]; then
            RETRAIN_FLAG="--retrain"
          fi

          YYYYMM="${{ inputs.year }}$(printf '%02d' ${{ inputs.month }})"

          python ml/src/scripts/run_backtest.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            --real-odds \
            --strategy-config ${STRATEGY_CONFIG} \
            $RETRAIN_FLAG \
            --output artifacts/backtest_${YYYYMM}_${{ inputs.label }}.csv
        env:
          DATABASE_URL: ${{ secrets.BACKTEST_DATABASE_URL }}

      # ── 2. 評価ゲート ──────────────────────────────────────────────────
      - name: Run gate check
        id: gate
        run: |
          YYYYMM="${{ inputs.year }}$(printf '%02d' ${{ inputs.month }})"
          python ml/src/scripts/run_gate_check.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            --csv artifacts/backtest_${YYYYMM}_${{ inputs.label }}.csv \
            --label ${{ inputs.label }} \
            --no-append \
            2>&1 | tee artifacts/gate_result_${YYYYMM}_${{ inputs.label }}.txt

          GATE_JSON="artifacts/gate_result_${YYYYMM}_${{ inputs.label }}.json"
          if [ -f "$GATE_JSON" ]; then
            ZONE=$(python -c "import json; d=json.load(open('${GATE_JSON}')); print(d['zone'])")
            ROI=$(python -c "import json; d=json.load(open('${GATE_JSON}')); print(d['roi_pct'])")
            echo "zone=${ZONE}" >> $GITHUB_OUTPUT
            echo "roi=${ROI}" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ── 3. セグメント分析（コース/場/確率帯/EV帯 別 ROI）──────────────
      - name: Run segment analysis
        run: |
          YYYYMM="${{ inputs.year }}$(printf '%02d' ${{ inputs.month }})"
          COMBO_FILE="artifacts/combos_${YYYYMM}.csv"
          PROB="${{ steps.strategy.outputs.prob_threshold }}"
          EV="${{ steps.strategy.outputs.ev_threshold }}"

          if [ -f "$COMBO_FILE" ]; then
            python ml/src/scripts/run_segment_analysis.py \
              --combos-csv "$COMBO_FILE" \
              --prob-threshold "${PROB}" \
              --ev-threshold "${EV}" \
              2>&1 | tee artifacts/segment_${YYYYMM}_${{ inputs.label }}.txt
          else
            python ml/src/scripts/run_segment_analysis.py \
              --year ${{ inputs.year }} \
              --month ${{ inputs.month }} \
              --prob-threshold "${PROB}" \
              --ev-threshold "${EV}" \
              --real-odds \
              2>&1 | tee artifacts/segment_${YYYYMM}_${{ inputs.label }}.txt
          fi
        continue-on-error: true

      # ── 4. すべての結果を artifacts にアップロード（Claude がダウンロード）
      - name: Upload all results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inner-loop-${{ inputs.year }}-${{ inputs.month }}-${{ inputs.label }}-run${{ github.run_number }}
          path: |
            artifacts/backtest_*.csv
            artifacts/gate_result_*.json
            artifacts/gate_result_*.txt
            artifacts/segment_*.txt
            artifacts/segment_*.csv
            artifacts/combos_*.csv
          retention-days: 30
