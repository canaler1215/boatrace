name: Collect Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: '3,33 0-9 * * *'  # 毎30分 09:03-18:33 JST (00:03-09:33 UTC) レース時間帯の高頻度収集（毎時開始を避けて遅延低減）
    - cron: '0 22 * * *'      # 毎日 07:00 JST (UTC 22:00 前日) レース前収集
    - cron: '30 12 * * *'     # 毎日 21:30 JST (UTC 12:30)  レース後収集・着順取得
    - cron: '0 18 * * 0'      # 毎週日曜 03:00 JST (UTC 18:00) racer_st_stats 更新

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Run collector
        run: python ml/src/scripts/run_collect.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-racer-st-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # 日曜スケジュールまたは手動実行時のみ racer_st_stats を再構築（日次スケジュールでは実行しない）
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 18 * * 0')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt
          sudo apt-get install -y lhasa

      - name: Build racer ST stats (past 2 years)
        run: python ml/src/scripts/build_racer_st_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
