name: Collect Race Data

on:
  workflow_dispatch:
  # 2026-04-28 (P-v) 凍結: 定期実行停止。
  # repository_dispatch (cron-job.org) も停止 → 別途 cron-job.org 側でジョブを無効化すること。
  # repository_dispatch:
  #   types: [collect-trigger]   # cron-job.org からの 30 分ごと定期トリガー
  # schedule:
  #   - cron: '0 22 * * *'      # 毎日 07:00 JST (UTC 22:00 前日) レース前収集
  #   - cron: '30 12 * * *'     # 毎日 21:30 JST (UTC 12:30)  レース後収集・着順取得
  #   - cron: '0 18 * * 0'      # 毎週日曜 03:00 JST (UTC 18:00) racer_st_stats 更新

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Run collector
        run: python ml/src/scripts/run_collect.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
