name: Collect Race Data

on:
  workflow_dispatch:         # 手動実行のみ
  schedule:
    - cron: '0 18 * * 0'    # 毎週日曜 03:00 JST (UTC 18:00) に racer_st_stats を更新

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Run collector
        run: python ml/src/scripts/run_collect.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-racer-st-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # スケジュール実行時または手動実行時に racer_st_stats を再構築
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt
          sudo apt-get install -y lhasa

      - name: Build racer ST stats (past 2 years)
        run: python ml/src/scripts/build_racer_st_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
