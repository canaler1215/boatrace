name: T6-B Recovery Analysis (3連単外れ × 3連複的中)

# T6-B: 3連単（S6標準）vs 3連複（T6-A最適）のリカバリー分析
#
# 【タイムアウト対策】
# 合成オッズモード (use_real_odds: false, デフォルト): 約20〜30分で完了
# 実オッズモード (use_real_odds: true): trifecta+trio 3ヶ月分で6時間超 → 非推奨
#   実オッズが必要な場合は backtest.yml を月ごとに実行してキャッシュを作成した後に実行すること

on:
  workflow_dispatch:
    inputs:
      start:
        description: '分析開始月 (YYYY-MM)'
        required: true
        default: '2025-10'
      end:
        description: '分析終了月 (YYYY-MM)'
        required: true
        default: '2025-12'
      use_real_odds:
        description: '実オッズを使用（false=合成オッズ、高速推奨）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      trifecta_prob:
        description: '3連単: 的中確率閾値（S6標準=0.07）'
        required: false
        default: '0.07'
      trifecta_ev:
        description: '3連単: EV閾値（S6標準=2.0）'
        required: false
        default: '2.0'
      trio_prob:
        description: '3連複: 的中確率閾値（T6-A最適=0.20）'
        required: false
        default: '0.20'
      trio_ev:
        description: '3連複: EV閾値（T6-A最適=4.0）'
        required: false
        default: '4.0'
      exclude_stadiums:
        description: '除外場ID（スペース区切り、例: "11"）'
        required: false
        default: '11'

jobs:
  recovery_analysis:
    runs-on: ubuntu-latest
    # 合成オッズ: 30分以内、実オッズ: 最大6時間（GitHub Actions上限）
    timeout-minutes: 350

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.start }}-${{ inputs.end }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.start }}-${{ inputs.end }}-
            kbfile-${{ inputs.start }}-

      # 実オッズ使用時のみオッズキャッシュを復元（walkforward.yml のキャッシュと共有）
      - name: Restore trifecta odds cache
        if: inputs.use_real_odds == 'true'
        uses: actions/cache@v4
        with:
          path: data/odds/odds_*.parquet
          key: odds-v2-${{ inputs.start }}-${{ inputs.end }}-trifecta-${{ github.run_id }}
          restore-keys: |
            odds-v2-${{ inputs.start }}-${{ inputs.end }}-trifecta-
            odds-v2-${{ inputs.start }}-${{ inputs.end }}-
            odds-v2-${{ inputs.start }}-
            odds-v2-

      - name: Restore trio odds cache
        if: inputs.use_real_odds == 'true'
        uses: actions/cache@v4
        with:
          path: data/odds/trio_odds_*.parquet
          key: odds-v2-${{ inputs.start }}-${{ inputs.end }}-trio-${{ github.run_id }}
          restore-keys: |
            odds-v2-${{ inputs.start }}-${{ inputs.end }}-trio-
            odds-v2-${{ inputs.start }}-${{ inputs.end }}-
            odds-v2-${{ inputs.start }}-
            odds-v2-

      - name: Download latest model
        id: download_model
        run: python ml/src/scripts/download_model.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run recovery analysis
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.use_real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi

          EXCLUDE_STADIUMS_FLAG=""
          if [ -n "${{ inputs.exclude_stadiums }}" ]; then
            EXCLUDE_STADIUMS_FLAG="--exclude-stadiums ${{ inputs.exclude_stadiums }}"
          fi

          python ml/src/scripts/run_recovery_analysis.py \
            --start ${{ inputs.start }} \
            --end ${{ inputs.end }} \
            --trifecta-prob ${{ inputs.trifecta_prob }} \
            --trifecta-ev ${{ inputs.trifecta_ev }} \
            --trio-prob ${{ inputs.trio_prob }} \
            --trio-ev ${{ inputs.trio_ev }} \
            $REAL_ODDS_FLAG \
            $EXCLUDE_STADIUMS_FLAG \
            --output artifacts/recovery_analysis_${{ inputs.start }}_${{ inputs.end }}.csv

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recovery-analysis-${{ inputs.start }}-${{ inputs.end }}-run${{ github.run_number }}
          path: |
            artifacts/recovery_analysis_*.csv
          retention-days: 90
