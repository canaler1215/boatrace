name: Build Racer ST Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'      # 毎週日曜 03:00 JST (UTC 18:00)

jobs:
  build-racer-st-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt
          sudo apt-get install -y lhasa

      - name: Build racer ST stats (past 2 years)
        run: python ml/src/scripts/build_racer_st_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
