name: Grid Search (prob × EV threshold)

on:
  workflow_dispatch:
    inputs:
      year:
        description: '対象年（単月モード, --start/--end 使用時は空で可）'
        required: false
        default: '2025'
      month:
        description: '対象月 1-12（単月モード）'
        required: false
        default: '12'
      start:
        description: '開始年月 YYYY-MM（複数月モード。空なら単月）'
        required: false
        default: ''
      end:
        description: '終了年月 YYYY-MM（複数月モード）'
        required: false
        default: ''
      bet_type:
        description: '賭け式: trifecta（3連単）or trio（3連複）'
        required: false
        default: 'trifecta'
        type: choice
        options:
          - trifecta
          - trio
      prob_thresholds:
        description: 'prob_threshold 候補（スペース区切り。空なら組み込みデフォルト）'
        required: false
        default: ''
      ev_thresholds:
        description: 'ev_threshold 候補（スペース区切り。空なら組み込みデフォルト）'
        required: false
        default: ''
      retrain:
        description: 'モデルを再学習'
        required: false
        default: 'false'
        type: boolean
      real_odds:
        description: '実オッズを使用'
        required: false
        default: 'true'
        type: boolean
      bet_amount:
        description: '1点賭け金（円）'
        required: false
        default: '100'
      max_bets:
        description: '1レース最大賭け点数'
        required: false
        default: '5'
      filter_overestimation:
        description: 'win_prob≥10%（Plackett-Luce過大推定ビン）を除外してグリッドサーチ'
        required: false
        default: false
        type: boolean
      train_start_year:
        description: '学習開始年（--retrain 時）'
        required: false
        default: '2023'
      train_start_month:
        description: '学習開始月（--retrain 時）'
        required: false
        default: '1'

jobs:
  grid_search:
    runs-on: ubuntu-latest
    timeout-minutes: 480   # 最大8時間

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.year }}-${{ inputs.month }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.year }}-${{ inputs.month }}-

      # combos CSV キャッシュ（同じ月・モデルで再実行する場合に再利用）
      - name: Restore combos cache
        uses: actions/cache@v4
        with:
          path: |
            artifacts/combos_*.csv
            artifacts/trio_combos_*.csv
          key: combos-${{ inputs.bet_type }}-${{ inputs.start || inputs.year }}-${{ inputs.end || inputs.month }}-${{ github.run_id }}
          restore-keys: |
            combos-${{ inputs.bet_type }}-${{ inputs.start || inputs.year }}-${{ inputs.end || inputs.month }}-

      - name: Download latest model
        id: download_model
        run: python ml/src/scripts/download_model.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run grid search
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi
          RETRAIN_FLAG=""
          if [ "${{ inputs.retrain }}" == "true" ]; then
            RETRAIN_FLAG="--retrain --train-start-year ${{ inputs.train_start_year }} --train-start-month ${{ inputs.train_start_month }}"
          fi
          FILTER_FLAG=""
          if [ "${{ inputs.filter_overestimation }}" == "true" ]; then
            FILTER_FLAG="--filter-overestimation"
          fi
          # 複数月モード vs 単月モード
          if [ -n "${{ inputs.start }}" ] && [ -n "${{ inputs.end }}" ]; then
            RANGE_OPT="--start ${{ inputs.start }} --end ${{ inputs.end }}"
            YEAR_MONTH_OPT=""
          else
            RANGE_OPT=""
            MONTH_PAD=$(printf "%02d" ${{ inputs.month }})
            YEAR_MONTH_OPT="--year ${{ inputs.year }} --month ${{ inputs.month }}"
            # 単月: 既存 combo CSV があれば再利用
            BET_PREFIX="${{ inputs.bet_type == 'trio' && 'trio_combos' || 'combos' }}"
            COMBO_FILE="artifacts/${BET_PREFIX}_${{ inputs.year }}${MONTH_PAD}.csv"
            if [ -f "$COMBO_FILE" ]; then
              echo "Reusing cached combos CSV: $COMBO_FILE"
              YEAR_MONTH_OPT="--combos-csv $COMBO_FILE"
            fi
          fi
          PROB_OPT=""
          if [ -n "${{ inputs.prob_thresholds }}" ]; then
            PROB_OPT="--prob-thresholds ${{ inputs.prob_thresholds }}"
          fi
          EV_OPT=""
          if [ -n "${{ inputs.ev_thresholds }}" ]; then
            EV_OPT="--ev-thresholds ${{ inputs.ev_thresholds }}"
          fi
          python ml/src/scripts/run_grid_search.py \
            --bet-type ${{ inputs.bet_type }} \
            --bet-amount ${{ inputs.bet_amount }} \
            --max-bets ${{ inputs.max_bets }} \
            $REAL_ODDS_FLAG \
            $RETRAIN_FLAG \
            $FILTER_FLAG \
            $RANGE_OPT \
            $YEAR_MONTH_OPT \
            $PROB_OPT \
            $EV_OPT

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grid-search-${{ inputs.bet_type }}-${{ inputs.start || inputs.year }}-${{ inputs.end || inputs.month }}-run${{ github.run_number }}
          path: |
            artifacts/grid_search_*.csv
            artifacts/combos_*.csv
            artifacts/trio_combos_*.csv
            data/odds/odds_*.parquet
            data/odds/trio_odds_*.parquet
            artifacts/segment_*.csv
          retention-days: 90
