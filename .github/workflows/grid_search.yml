name: Grid Search (prob × EV threshold)

on:
  workflow_dispatch:
    inputs:
      year:
        description: '対象年'
        required: true
        default: '2025'
      month:
        description: '対象月 (1-12)'
        required: true
        default: '12'
      retrain:
        description: 'モデルを再学習'
        required: false
        default: 'false'
        type: boolean
      real_odds:
        description: '実オッズを使用'
        required: false
        default: 'true'
        type: boolean
      bet_amount:
        description: '1点賭け金（円）'
        required: false
        default: '100'
      max_bets:
        description: '1レース最大賭け点数'
        required: false
        default: '5'
      train_start_year:
        description: '学習開始年（--retrain 時）'
        required: false
        default: '2023'
      train_start_month:
        description: '学習開始月（--retrain 時）'
        required: false
        default: '1'

jobs:
  grid_search:
    runs-on: ubuntu-latest
    timeout-minutes: 480   # 最大8時間

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.year }}-${{ inputs.month }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.year }}-${{ inputs.month }}-

      # combos CSV キャッシュ（同じ月・モデルで再実行する場合に再利用）
      - name: Restore combos cache
        uses: actions/cache@v4
        with:
          path: artifacts/combos_*.csv
          key: combos-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            combos-${{ inputs.year }}-${{ inputs.month }}-

      - name: Download latest model
        id: download_model
        run: python ml/src/scripts/download_model.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run grid search
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi
          RETRAIN_FLAG=""
          if [ "${{ inputs.retrain }}" == "true" ]; then
            RETRAIN_FLAG="--retrain --train-start-year ${{ inputs.train_start_year }} --train-start-month ${{ inputs.train_start_month }}"
          fi
          # combos CSV が既にキャッシュされていれば再利用（再ダウンロード不要）
          MONTH_PAD=$(printf "%02d" ${{ inputs.month }})
          COMBO_FILE="artifacts/combos_${{ inputs.year }}${MONTH_PAD}.csv"
          COMBO_OPT=""
          if [ -f "$COMBO_FILE" ]; then
            echo "Reusing cached combos CSV: $COMBO_FILE"
            COMBO_OPT="--combos-csv $COMBO_FILE"
          fi
          python ml/src/scripts/run_grid_search.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            --bet-amount ${{ inputs.bet_amount }} \
            --max-bets ${{ inputs.max_bets }} \
            $REAL_ODDS_FLAG \
            $RETRAIN_FLAG \
            $COMBO_OPT

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grid-search-${{ inputs.year }}-${{ inputs.month }}-run${{ github.run_number }}
          path: |
            artifacts/grid_search_*.csv
            artifacts/combos_*.csv
            data/odds/odds_*.parquet
          retention-days: 90
