name: Backtest (Real Odds)

on:
  workflow_dispatch:
    inputs:
      year:
        description: '対象年'
        required: true
        default: '2025'
      month:
        description: '対象月 (1-12)'
        required: true
        default: '12'
      bet_type:
        description: '賭式 (trifecta=3連単 / trio=3連複 / both=両方)'
        required: false
        default: 'trifecta'
        type: choice
        options:
          - trifecta
          - trio
          - both
      prob_threshold:
        description: '的中確率閾値（例: 0.07 = 7%）'
        required: false
        default: '0.07'
      ev_threshold:
        description: 'EV閾値（例: 2.0。0.0 で無効）'
        required: false
        default: '2.0'
      max_bets:
        description: '1レースあたり最大賭け点数'
        required: false
        default: '5'
      exclude_courses:
        description: '除外する1着艇番（スペース区切り、例: "2 4 5"。空欄で無効）'
        required: false
        default: '2 4 5'
      min_odds:
        description: '購入オッズ下限（例: 100。空欄で無効）'
        required: false
        default: '100'
      exclude_stadiums:
        description: '除外する場ID（スペース区切り、例: "11"。空欄で無効）'
        required: false
        default: '11'
      retrain:
        description: 'テスト期間を除外してモデルを再学習'
        required: false
        default: false
        type: boolean
      train_start_year:
        description: '--retrain 時の学習開始年'
        required: false
        default: '2023'
      train_start_month:
        description: '--retrain 時の学習開始月'
        required: false
        default: '1'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最大6時間

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      # 前回中断時の partial.parquet をキャッシュから復元
      - name: Restore odds partial cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.year }}-${{ inputs.month }}-${{ inputs.bet_type }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.year }}-${{ inputs.month }}-${{ inputs.bet_type }}-
            odds-${{ inputs.year }}-${{ inputs.month }}-

      # GitHub Releases から最新モデルをダウンロード（なければ --retrain で学習）
      - name: Download latest model
        if: ${{ inputs.retrain == false }}
        id: download_model
        run: python ml/src/scripts/download_model.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run backtest with real odds
        run: |
          # オプション組み立て
          RETRAIN_FLAG=""
          if [ "${{ inputs.retrain }}" == "true" ] || [ "${{ steps.download_model.outcome }}" != "success" ]; then
            RETRAIN_FLAG="--retrain --train-start-year ${{ inputs.train_start_year }} --train-start-month ${{ inputs.train_start_month }}"
          fi

          EXCLUDE_COURSES_FLAG=""
          if [ -n "${{ inputs.exclude_courses }}" ]; then
            EXCLUDE_COURSES_FLAG="--exclude-courses ${{ inputs.exclude_courses }}"
          fi

          MIN_ODDS_FLAG=""
          if [ -n "${{ inputs.min_odds }}" ]; then
            MIN_ODDS_FLAG="--min-odds ${{ inputs.min_odds }}"
          fi

          EXCLUDE_STADIUMS_FLAG=""
          if [ -n "${{ inputs.exclude_stadiums }}" ]; then
            EXCLUDE_STADIUMS_FLAG="--exclude-stadiums ${{ inputs.exclude_stadiums }}"
          fi

          python ml/src/scripts/run_backtest.py \
            --year ${{ inputs.year }} \
            --month ${{ inputs.month }} \
            --bet-type ${{ inputs.bet_type }} \
            --real-odds \
            --prob-threshold ${{ inputs.prob_threshold }} \
            --ev-threshold ${{ inputs.ev_threshold }} \
            --max-bets ${{ inputs.max_bets }} \
            $RETRAIN_FLAG \
            $EXCLUDE_COURSES_FLAG \
            $MIN_ODDS_FLAG \
            $EXCLUDE_STADIUMS_FLAG \
            --output artifacts/backtest_${{ inputs.year }}${{ inputs.month }}_${{ inputs.bet_type }}.csv

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ inputs.year }}-${{ inputs.month }}-${{ inputs.bet_type }}-run${{ github.run_number }}
          path: |
            artifacts/backtest_*.csv
            data/odds/odds_*.parquet
            data/odds/trio_odds_*.parquet
          retention-days: 90
