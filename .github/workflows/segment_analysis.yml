name: Segment Analysis (場・コース・オッズ帯・確率帯)

on:
  workflow_dispatch:
    inputs:
      year:
        description: '対象年'
        required: true
        default: '2025'
      month:
        description: '対象月 (1-12)'
        required: true
        default: '12'
      real_odds:
        description: '実オッズを使用（combo CSV 新規生成時）'
        required: false
        default: true
        type: boolean
      prob_threshold:
        description: '確率閾値（デフォルト: 0.03 = 3%）'
        required: false
        default: '0.03'
      ev_threshold:
        description: 'EV 閾値（デフォルト: 1.2）'
        required: false
        default: '1.2'
      max_bets:
        description: '1レース最大賭け点数'
        required: false
        default: '5'
      bet_amount:
        description: '1点賭け金（円）'
        required: false
        default: '100'
      min_bets:
        description: '表示最小賭け点数（少ないセグメントを除外）'
        required: false
        default: '10'

jobs:
  segment_analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 480   # 最大8時間

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.year }}-${{ inputs.month }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-v2-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            odds-v2-${{ inputs.year }}-${{ inputs.month }}-

      # grid_search.yml が先に実行済みであれば combo CSV を再利用（高速）
      - name: Restore combos cache
        uses: actions/cache@v4
        with:
          path: artifacts/combos_*.csv
          key: combos-${{ inputs.year }}-${{ inputs.month }}-${{ github.run_id }}
          restore-keys: |
            combos-${{ inputs.year }}-${{ inputs.month }}-

      - name: Download latest model
        id: download_model
        run: python ml/src/scripts/download_model.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run segment analysis
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi
          # combos CSV が既にキャッシュされていれば再利用（再ダウンロード不要）
          MONTH_PAD=$(printf "%02d" ${{ inputs.month }})
          COMBO_FILE="artifacts/combos_${{ inputs.year }}${MONTH_PAD}.csv"
          if [ -f "$COMBO_FILE" ]; then
            echo "Reusing cached combos CSV: $COMBO_FILE"
            python ml/src/scripts/run_segment_analysis.py \
              --combos-csv "$COMBO_FILE" \
              --prob-threshold ${{ inputs.prob_threshold }} \
              --ev-threshold ${{ inputs.ev_threshold }} \
              --max-bets ${{ inputs.max_bets }} \
              --bet-amount ${{ inputs.bet_amount }} \
              --min-bets ${{ inputs.min_bets }}
          else
            python ml/src/scripts/run_segment_analysis.py \
              --year ${{ inputs.year }} \
              --month ${{ inputs.month }} \
              --prob-threshold ${{ inputs.prob_threshold }} \
              --ev-threshold ${{ inputs.ev_threshold }} \
              --max-bets ${{ inputs.max_bets }} \
              --bet-amount ${{ inputs.bet_amount }} \
              --min-bets ${{ inputs.min_bets }} \
              $REAL_ODDS_FLAG
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: segment-${{ inputs.year }}-${{ inputs.month }}-run${{ github.run_number }}
          path: |
            artifacts/segment_*.csv
            artifacts/combos_*.csv
          retention-days: 90
