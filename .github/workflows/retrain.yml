name: Retrain Model

on:
  schedule:
    - cron: '0 2 1 * *'   # 毎月1日 2:00 UTC
  workflow_dispatch:        # 手動実行 (初期訓練もここから)

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最大6時間

    permissions:
      contents: write      # GitHub Releases へのアップロードに必要

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Train model
        run: python ml/src/scripts/run_retrain.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload model to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ github.run_id }}
          name: "Model ${{ github.run_id }}"
          body: |
            Retrained model artifact.
            Run: ${{ github.run_id }}
          files: artifacts/model_*.pkl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
