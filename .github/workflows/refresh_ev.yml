name: Refresh EV (Lightweight Odds Update)

on:
  workflow_dispatch:
  # 2026-04-28 (P-v) 凍結: 定期実行停止。manual dispatch のみ残す。
  # cron-job.org 側で refresh-ev-trigger ジョブを無効化すること。
  # repository_dispatch:
  #   types: [refresh-ev-trigger]   # cron-job.org からの 10 分ごと定期トリガー

jobs:
  refresh_ev:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Refresh EV from latest odds
        run: python ml/src/scripts/run_refresh_ev.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
