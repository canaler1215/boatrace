name: Session 3 検証パイプライン (再学習 → キャリブレーション → Walk-Forward)

# Session 3 のコード変更（キャリブレーション補正 + 時系列Split）を一括検証するパイプライン。
#
# ジョブ構成:
#   retrain      : 新しい trainer.py（IsotonicRegression + 時系列Split）でモデルを再学習
#                  → artifacts に保存 + GitHub Releases に公開
#   calibration  : retrain 完了後、同じモデルで 1着 ECE を計測（目標: 0.02 以下）
#   walkforward  : retrain と並行して、Walk-Forward で各月再学習 → ROI を計測
#
# 使い方:
#   GitHub UI の "Run workflow" ボタンから手動実行（workflow_dispatch）

on:
  workflow_dispatch:
    inputs:
      train_start_year:
        description: '再学習の学習開始年'
        required: false
        default: '2022'
      train_start_month:
        description: '再学習の学習開始月'
        required: false
        default: '1'
      cal_year:
        description: 'キャリブレーション検証年'
        required: false
        default: '2025'
      cal_month:
        description: 'キャリブレーション検証月 (1-12)'
        required: false
        default: '12'
      wf_start:
        description: 'Walk-Forward 開始月 (YYYY-MM)'
        required: false
        default: '2025-10'
      wf_end:
        description: 'Walk-Forward 終了月 (YYYY-MM)'
        required: false
        default: '2025-12'
      real_odds:
        description: '実オッズを使用（キャリブレーション・Walk-Forward 共通）'
        required: false
        default: 'true'
        type: boolean

jobs:
  # ============================================================
  # Job 1: 再学習
  #   新しい trainer.py（IsotonicRegression calibrator + 時系列Split）で
  #   フルデータを使ってモデルを再学習し、GitHub Releases にアップロードする。
  # ============================================================
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    outputs:
      model_version: ${{ steps.version.outputs.model_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.train_start_year }}-${{ inputs.train_start_month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.train_start_year }}-${{ inputs.train_start_month }}-
            kbfile-${{ inputs.train_start_year }}-

      - name: Train model (Session 3: IsotonicRegression + 時系列Split)
        run: python ml/src/scripts/run_retrain.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRAIN_START_YEAR: ${{ inputs.train_start_year }}
          TRAIN_START_MONTH: ${{ inputs.train_start_month }}

      - name: Read model version
        id: version
        run: |
          VERSION=$(cat artifacts/model_version.txt)
          echo "model_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Model version: ${VERSION}"

      - name: Read model metrics
        id: metrics
        run: |
          echo "metrics<<EOF" >> $GITHUB_OUTPUT
          cat artifacts/model_metrics.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # calibration ジョブがダウンロードできるよう model_latest.pkl も作成
      - name: Create model_latest.pkl
        run: |
          VERSION=$(cat artifacts/model_version.txt)
          cp "artifacts/model_${VERSION}.pkl" artifacts/model_latest.pkl
          echo "Copied model_${VERSION}.pkl → model_latest.pkl"

      - name: Upload model artifact (calibration ジョブ用)
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-session3-${{ steps.version.outputs.model_version }}
          path: |
            artifacts/model_latest.pkl
            artifacts/model_version.txt
            artifacts/model_metrics.txt
          retention-days: 7

      - name: Upload model to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ steps.version.outputs.model_version }}-s3-run${{ github.run_number }}
          name: "Session 3 Model ${{ steps.version.outputs.model_version }} (#${{ github.run_number }})"
          body: |
            ## Session 3 学習済みモデル

            **変更点**: Isotonic Regression キャリブレーション補正 + 時系列 Split (P7修正)

            ```
            ${{ steps.metrics.outputs.metrics }}
            ```

            - Pipeline: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Branch: `${{ github.ref_name }}`
          files: |
            artifacts/model_*.pkl
            artifacts/model_metrics.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload retrain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-session3-${{ steps.version.outputs.model_version }}-run${{ github.run_number }}
          path: |
            artifacts/model_*.pkl
            artifacts/model_version.txt
            artifacts/model_metrics.txt
          retention-days: 90

  # ============================================================
  # Job 2: キャリブレーション分析
  #   retrain ジョブのモデルを受け取り、指定月で ECE を計測する。
  #   目標: 1着 ECE を 0.02 以下に改善できているか確認。
  # ============================================================
  calibration:
    needs: retrain
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      # retrain ジョブでビルドしたモデルを artifacts/ に配置
      - name: Download model from retrain job
        uses: actions/download-artifact@v4
        with:
          name: model-session3-${{ needs.retrain.outputs.model_version }}
          path: artifacts/

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.cal_year }}-${{ inputs.cal_month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.cal_year }}-${{ inputs.cal_month }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.cal_year }}-${{ inputs.cal_month }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.cal_year }}-${{ inputs.cal_month }}-

      - name: Run calibration analysis
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi
          python ml/src/scripts/run_calibration.py \
            --year ${{ inputs.cal_year }} \
            --month ${{ inputs.cal_month }} \
            $REAL_ODDS_FLAG

      - name: Show calibration summary
        if: always()
        run: |
          echo "=== Calibration Summary ==="
          MONTH_PAD=$(printf "%02d" ${{ inputs.cal_month }})
          SUMMARY="artifacts/calibration_${{ inputs.cal_year }}${MONTH_PAD}_summary.csv"
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY"
          else
            echo "Summary file not found: $SUMMARY"
          fi

      - name: Upload calibration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-session3-${{ inputs.cal_year }}-${{ inputs.cal_month }}-run${{ github.run_number }}
          path: |
            artifacts/calibration_*.csv
          retention-days: 90

  # ============================================================
  # Job 3: Walk-Forward バックテスト（retrain と並行実行）
  #   各テスト月直前のデータで再学習（新 trainer.py）し、実オッズでROIを計測。
  #   Session 2 と比較して ROI・的中率が改善しているかを確認する。
  # ============================================================
  walkforward:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.wf_start }}-${{ inputs.wf_end }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.wf_start }}-${{ inputs.wf_end }}-
            kbfile-${{ inputs.wf_start }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.wf_start }}-${{ inputs.wf_end }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.wf_start }}-${{ inputs.wf_end }}-
            odds-${{ inputs.wf_start }}-
            odds-

      - name: Run Walk-Forward backtest (Session 3 モデル)
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi
          python ml/src/scripts/run_walkforward.py \
            --start "${{ inputs.wf_start }}" \
            --end "${{ inputs.wf_end }}" \
            --retrain \
            --train-start-year ${{ inputs.train_start_year }} \
            --train-start-month ${{ inputs.train_start_month }} \
            $REAL_ODDS_FLAG

      - name: Upload Walk-Forward results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkforward-session3-${{ inputs.wf_start }}-${{ inputs.wf_end }}-run${{ github.run_number }}
          path: |
            artifacts/walkforward_*.csv
            data/odds/odds_*.parquet
          retention-days: 90
