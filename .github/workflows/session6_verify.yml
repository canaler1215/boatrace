name: Session 6 検証パイプライン (Softmax正規化 + Isotonic Regression + Walk-Forward)

# Session 6 のコード変更（Softmax正規化 + Isotonic Regression）を一括検証するパイプライン。
#
# ジョブ構成:
#   retrain     : Softmax正規化 + Isotonic Regression でフルデータ再学習 → GitHub Releases に公開
#   calibration : retrain モデルで ECE 計測（目標: 1着 ECE 改善、trifecta ECE 改善）
#   walkforward : Session 5 ルール維持で Walk-Forward（各月再学習）
#   walkforward_long : 長期 Walk-Forward（2024-01〜2025-12, S6-3）
#
# 使い方:
#   GitHub UI の "Run workflow" ボタンから手動実行（workflow_dispatch）
#   デフォルト値が S6 の推奨設定になっているので、そのまま実行可能。

on:
  workflow_dispatch:
    inputs:
      # ── 学習設定 ───────────────────────────────────────────────
      train_start_year:
        description: '再学習の学習開始年'
        required: false
        default: '2022'
      train_start_month:
        description: '再学習の学習開始月'
        required: false
        default: '1'

      # ── キャリブレーション検証設定 ────────────────────────────────
      cal_year:
        description: 'キャリブレーション検証年'
        required: false
        default: '2025'
      cal_month:
        description: 'キャリブレーション検証月 (1-12)'
        required: false
        default: '12'

      # ── Walk-Forward 設定（短期: S5 比較用） ───────────────────────
      wf_start:
        description: 'Walk-Forward 開始月 (YYYY-MM)'
        required: false
        default: '2025-10'
      wf_end:
        description: 'Walk-Forward 終了月 (YYYY-MM)'
        required: false
        default: '2025-12'

      # ── Walk-Forward 設定（長期: S6-3） ───────────────────────────
      wf_long_start:
        description: '長期 Walk-Forward 開始月 (YYYY-MM, S6-3)'
        required: false
        default: '2024-01'
      wf_long_end:
        description: '長期 Walk-Forward 終了月 (YYYY-MM, S6-3)'
        required: false
        default: '2025-12'
      run_long_walkforward:
        description: '長期 Walk-Forward を実行する（S6-3, 時間がかかる）'
        required: false
        default: false
        type: boolean

      real_odds:
        description: '実オッズを使用'
        required: false
        default: true
        type: boolean

      # ── 購入閾値（Session 5 ルール維持） ──────────────────────────
      prob_threshold:
        description: '的中確率閾値（S5推奨: 0.07）'
        required: false
        default: '0.07'
      ev_threshold:
        description: 'EV閾値（S5推奨: 2.0）'
        required: false
        default: '2.0'
      max_bets:
        description: '1レース最大賭け点数'
        required: false
        default: '5'
      exclude_courses:
        description: '除外する1着艇番（スペース区切り）'
        required: false
        default: '2 4 5'
      min_odds:
        description: 'オッズ下限'
        required: false
        default: '100'
      exclude_stadiums:
        description: '除外する場ID（スペース区切り）'
        required: false
        default: '11'

jobs:
  # ============================================================
  # Job 1: 再学習（Softmax正規化 + Isotonic Regression）
  # ============================================================
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    outputs:
      model_version: ${{ steps.version.outputs.model_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.train_start_year }}-${{ inputs.train_start_month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.train_start_year }}-${{ inputs.train_start_month }}-
            kbfile-${{ inputs.train_start_year }}-

      - name: "Train model (Session 6: Softmax正規化 + Isotonic Regression)"
        run: python ml/src/scripts/run_retrain.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRAIN_START_YEAR: ${{ inputs.train_start_year }}
          TRAIN_START_MONTH: ${{ inputs.train_start_month }}

      - name: Read model version
        id: version
        run: |
          VERSION=$(cat artifacts/model_version.txt)
          echo "model_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Model version: ${VERSION}"

      - name: Read model metrics
        id: metrics
        run: |
          echo "metrics<<EOF" >> $GITHUB_OUTPUT
          cat artifacts/model_metrics.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create model_latest.pkl
        run: |
          VERSION=$(cat artifacts/model_version.txt)
          cp "artifacts/model_${VERSION}.pkl" artifacts/model_latest.pkl
          echo "Copied model_${VERSION}.pkl → model_latest.pkl"

      - name: Upload model artifact
        id: upload_model
        uses: actions/upload-artifact@v4
        with:
          name: model-session6-${{ steps.version.outputs.model_version }}
          path: |
            artifacts/model_latest.pkl
            artifacts/model_version.txt
            artifacts/model_metrics.txt
          retention-days: 7

      - name: Upload model to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ steps.version.outputs.model_version }}-s6-run${{ github.run_number }}
          name: "Session 6 Model ${{ steps.version.outputs.model_version }} (#${{ github.run_number }})"
          body: |
            ## Session 6 学習済みモデル

            **変更点**: Softmax正規化 + Isotonic Regression（per-bin 構造バイアス補正）

            ```
            ${{ steps.metrics.outputs.metrics }}
            ```

            - Pipeline: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Branch: `${{ github.ref_name }}`
          files: |
            artifacts/model_*.pkl
            artifacts/model_metrics.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload retrain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-session6-${{ steps.version.outputs.model_version }}-run${{ github.run_number }}
          path: |
            artifacts/model_*.pkl
            artifacts/model_version.txt
            artifacts/model_metrics.txt
          retention-days: 90

  # ============================================================
  # Job 2: キャリブレーション分析
  #   目標: 1着 ECE 改善（S5: 0.137）、trifecta ECE 改善（S5: 0.001123）
  # ============================================================
  calibration:
    needs: retrain
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Download model from retrain job
        uses: actions/download-artifact@v4
        with:
          name: model-session6-${{ needs.retrain.outputs.model_version }}
          path: artifacts/

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.cal_year }}-${{ inputs.cal_month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.cal_year }}-${{ inputs.cal_month }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.cal_year }}-${{ inputs.cal_month }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.cal_year }}-${{ inputs.cal_month }}-

      - name: Run calibration analysis
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi
          python ml/src/scripts/run_calibration.py \
            --year ${{ inputs.cal_year }} \
            --month ${{ inputs.cal_month }} \
            $REAL_ODDS_FLAG

      - name: Show calibration summary
        if: always()
        run: |
          echo "=== Calibration Summary (Session 6: Softmax + Isotonic Regression) ==="
          MONTH_PAD=$(printf "%02d" ${{ inputs.cal_month }})
          SUMMARY="artifacts/calibration_${{ inputs.cal_year }}${MONTH_PAD}_summary.csv"
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY"
          else
            echo "Summary file not found: $SUMMARY"
          fi

      - name: Upload calibration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-session6-${{ inputs.cal_year }}-${{ inputs.cal_month }}-run${{ github.run_number }}
          path: artifacts/calibration_*.csv
          retention-days: 90

  # ============================================================
  # Job 3: Walk-Forward バックテスト（短期: S5 比較用）
  # ============================================================
  walkforward:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.wf_start }}-${{ inputs.wf_end }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.wf_start }}-${{ inputs.wf_end }}-
            kbfile-${{ inputs.wf_start }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.wf_start }}-${{ inputs.wf_end }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.wf_start }}-${{ inputs.wf_end }}-
            odds-${{ inputs.wf_start }}-
            odds-

      - name: "Run Walk-Forward (Session 6: 短期 S5比較)"
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi

          EXCLUDE_COURSES_FLAG=""
          if [ -n "${{ inputs.exclude_courses }}" ]; then
            EXCLUDE_COURSES_FLAG="--exclude-courses ${{ inputs.exclude_courses }}"
          fi

          MIN_ODDS_FLAG=""
          if [ -n "${{ inputs.min_odds }}" ]; then
            MIN_ODDS_FLAG="--min-odds ${{ inputs.min_odds }}"
          fi

          EXCLUDE_STADIUMS_FLAG=""
          if [ -n "${{ inputs.exclude_stadiums }}" ]; then
            EXCLUDE_STADIUMS_FLAG="--exclude-stadiums ${{ inputs.exclude_stadiums }}"
          fi

          python ml/src/scripts/run_walkforward.py \
            --start "${{ inputs.wf_start }}" \
            --end "${{ inputs.wf_end }}" \
            --retrain \
            --train-start-year ${{ inputs.train_start_year }} \
            --train-start-month ${{ inputs.train_start_month }} \
            --prob-threshold ${{ inputs.prob_threshold }} \
            --ev-threshold ${{ inputs.ev_threshold }} \
            --max-bets ${{ inputs.max_bets }} \
            $REAL_ODDS_FLAG \
            $EXCLUDE_COURSES_FLAG \
            $MIN_ODDS_FLAG \
            $EXCLUDE_STADIUMS_FLAG

      - name: Upload Walk-Forward results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkforward-session6-${{ inputs.wf_start }}-${{ inputs.wf_end }}-run${{ github.run_number }}
          path: |
            artifacts/walkforward_*.csv
            artifacts/model_*.pkl
            data/odds/odds_*.parquet
          retention-days: 90

  # ============================================================
  # Job 4: 長期 Walk-Forward（S6-3: 2024-01〜2025-12）— 4並列チャンク版
  #   GH Actions 6h 制限を回避するため 4 チャンクを並列実行する。
  #   各チャンクは全月範囲を --chunk-total 4 --chunk-index N で均等分割して処理。
  # ============================================================
  walkforward_long:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ inputs.run_long_walkforward == true }}
    strategy:
      fail-fast: false
      matrix:
        chunk_index: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-long-c${{ matrix.chunk_index }}-${{ inputs.wf_long_start }}-${{ inputs.wf_long_end }}-${{ github.run_id }}
          restore-keys: |
            kbfile-long-c${{ matrix.chunk_index }}-${{ inputs.wf_long_start }}-${{ inputs.wf_long_end }}-
            kbfile-long-c${{ matrix.chunk_index }}-
            kbfile-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-long-c${{ matrix.chunk_index }}-${{ inputs.wf_long_start }}-${{ inputs.wf_long_end }}-${{ github.run_id }}
          restore-keys: |
            odds-long-c${{ matrix.chunk_index }}-${{ inputs.wf_long_start }}-${{ inputs.wf_long_end }}-
            odds-long-c${{ matrix.chunk_index }}-
            odds-

      - name: "Run Long Walk-Forward chunk ${{ matrix.chunk_index }}/4 (S6-3)"
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi

          EXCLUDE_COURSES_FLAG=""
          if [ -n "${{ inputs.exclude_courses }}" ]; then
            EXCLUDE_COURSES_FLAG="--exclude-courses ${{ inputs.exclude_courses }}"
          fi

          MIN_ODDS_FLAG=""
          if [ -n "${{ inputs.min_odds }}" ]; then
            MIN_ODDS_FLAG="--min-odds ${{ inputs.min_odds }}"
          fi

          EXCLUDE_STADIUMS_FLAG=""
          if [ -n "${{ inputs.exclude_stadiums }}" ]; then
            EXCLUDE_STADIUMS_FLAG="--exclude-stadiums ${{ inputs.exclude_stadiums }}"
          fi

          python ml/src/scripts/run_walkforward.py \
            --start "${{ inputs.wf_long_start }}" \
            --end "${{ inputs.wf_long_end }}" \
            --chunk-total 4 \
            --chunk-index ${{ matrix.chunk_index }} \
            --retrain \
            --retrain-interval 3 \
            --train-start-year ${{ inputs.train_start_year }} \
            --train-start-month ${{ inputs.train_start_month }} \
            --prob-threshold ${{ inputs.prob_threshold }} \
            --ev-threshold ${{ inputs.ev_threshold }} \
            --max-bets ${{ inputs.max_bets }} \
            $REAL_ODDS_FLAG \
            $EXCLUDE_COURSES_FLAG \
            $MIN_ODDS_FLAG \
            $EXCLUDE_STADIUMS_FLAG

      - name: Upload chunk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkforward-long-chunk${{ matrix.chunk_index }}-run${{ github.run_number }}
          path: artifacts/walkforward_*.csv
          retention-days: 90

  # ============================================================
  # Job 5: 長期 Walk-Forward マージ（全チャンク結果を結合・集計）
  # ============================================================
  walkforward_long_merge:
    needs: walkforward_long
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ always() && inputs.run_long_walkforward == true && needs.walkforward_long.result != 'skipped' && needs.walkforward_long.result != 'cancelled' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Download all chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: walkforward-long-chunk*-run${{ github.run_number }}
          merge-multiple: true
          path: artifacts/

      - name: Merge chunks and print summary
        run: |
          python - <<'PYEOF'
          import sys
          from pathlib import Path
          import pandas as pd

          chunks = sorted(Path("artifacts").glob("walkforward_*_chunk*of*.csv"))
          if not chunks:
              print("チャンク CSV が見つかりません。")
              sys.exit(1)

          print(f"マージ対象 ({len(chunks)} ファイル): {[c.name for c in chunks]}")
          df = pd.concat([pd.read_csv(f) for f in chunks], ignore_index=True)
          df = df.sort_values(["race_date", "race_id"])

          out = Path("artifacts/walkforward_long_merged.csv")
          df.to_csv(out, index=False)
          print(f"マージ完了: {out} ({len(df):,} 行)\n")

          total_wagered = float(df["amount_wagered"].sum())
          total_payout  = float(df["payout_received"].sum())
          total_bets    = int(df["bets_placed"].sum())
          total_wins    = int(df["matched"].sum())
          roi = (total_payout / total_wagered - 1) * 100 if total_wagered > 0 else 0.0
          win_rate = total_wins / total_bets * 100 if total_bets > 0 else 0.0
          avg_odds = float(df[df["matched"]]["matched_odds"].mean()) if total_wins > 0 else 0.0

          print("=" * 62)
          print("  長期 Walk-Forward 結果（全チャンクマージ）")
          print("=" * 62)
          print(f"  対象期間  : {df['race_date'].min()} 〜 {df['race_date'].max()}")
          print(f"  総レース  : {len(df):,}")
          print("-" * 62)
          print(f"  投資合計  : ¥{total_wagered:>12,.0f}")
          print(f"  払戻合計  : ¥{total_payout:>12,.0f}")
          print(f"  損益      : ¥{total_payout - total_wagered:>+12,.0f}")
          print(f"  ROI       : {roi:>+.1f}%")
          print("-" * 62)
          print(f"  的中      : {total_wins} / {total_bets} 点  ({win_rate:.2f}%)")
          print(f"  平均配当  : {avg_odds:.1f}x")
          print("=" * 62)

          df["month"] = df["race_date"].str[:7]
          monthly = df.groupby("month").agg(
              wagered=("amount_wagered", "sum"),
              payout=("payout_received", "sum"),
              n_bets=("bets_placed", "sum"),
              wins=("matched", "sum"),
          ).reset_index()

          print()
          print(f"  {'月':>7}  {'賭け点':>6}  {'投資':>10}  {'払戻':>10}  {'ROI':>7}  {'的中'}")
          print("  " + "-" * 58)
          for _, row in monthly.iterrows():
              roi_m = (row["payout"] / row["wagered"] - 1) * 100 if row["wagered"] > 0 else float("nan")
              print(
                  f"  {row['month']:>7}  {int(row['n_bets']):>6,}  "
                  f"¥{row['wagered']:>9,.0f}  ¥{row['payout']:>9,.0f}  "
                  f"{roi_m:>+6.1f}%  {int(row['wins'])}"
              )
          PYEOF

      - name: Upload merged results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkforward-long-merged-run${{ github.run_number }}
          path: artifacts/walkforward_long_merged.csv
          retention-days: 90
