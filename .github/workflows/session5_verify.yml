name: Session 5 検証パイプライン (Temperature Scaling + 購入ルール強化 + Walk-Forward)

# Session 5 のコード変更（Temperature Scaling + コース/オッズ/場フィルタ）を一括検証するパイプライン。
#
# ジョブ構成:
#   retrain     : Temperature Scaling でフルデータ再学習 → GitHub Releases に公開
#   calibration : retrain モデルで ECE 計測（目標: 1着 ECE 0.05 以下）
#   walkforward : 新フィルタ（prob≥7%, EV≥2.0, コース2/4/5除外, オッズ≥100x, びわこ除外）
#                 で 2025-10〜12 Walk-Forward（各月再学習）
#
# 使い方:
#   GitHub UI の "Run workflow" ボタンから手動実行（workflow_dispatch）
#   デフォルト値が S5-3 の推奨設定になっているので、そのまま実行可能。

on:
  workflow_dispatch:
    inputs:
      # ── 学習設定 ───────────────────────────────────────────────
      train_start_year:
        description: '再学習の学習開始年'
        required: false
        default: '2022'
      train_start_month:
        description: '再学習の学習開始月'
        required: false
        default: '1'

      # ── キャリブレーション検証設定 ────────────────────────────────
      cal_year:
        description: 'キャリブレーション検証年'
        required: false
        default: '2025'
      cal_month:
        description: 'キャリブレーション検証月 (1-12)'
        required: false
        default: '12'

      # ── Walk-Forward 設定 ──────────────────────────────────────
      wf_start:
        description: 'Walk-Forward 開始月 (YYYY-MM)'
        required: false
        default: '2025-10'
      wf_end:
        description: 'Walk-Forward 終了月 (YYYY-MM)'
        required: false
        default: '2025-12'
      real_odds:
        description: '実オッズを使用（キャリブレーション・Walk-Forward 共通）'
        required: false
        default: true
        type: boolean

      # ── 購入閾値 ──────────────────────────────────────────────
      prob_threshold:
        description: '的中確率閾値（S5推奨: 0.07）'
        required: false
        default: '0.07'
      ev_threshold:
        description: 'EV閾値（S5推奨: 2.0）'
        required: false
        default: '2.0'
      max_bets:
        description: '1レース最大賭け点数'
        required: false
        default: '5'

      # ── S5-1 購入ルール強化フィルタ ───────────────────────────────
      exclude_courses:
        description: '除外する1着艇番（スペース区切り, S5推奨: "2 4 5"）'
        required: false
        default: '2 4 5'
      min_odds:
        description: 'オッズ下限（S5推奨: 100 → 100倍未満除外）'
        required: false
        default: '100'
      exclude_stadiums:
        description: '除外する場ID（スペース区切り, S5推奨: "11" → びわこ除外）'
        required: false
        default: '11'

jobs:
  # ============================================================
  # Job 1: 再学習（Temperature Scaling）
  #   trainer.py Session 5 版（Temperature Scaling）でフルデータ再学習し、
  #   GitHub Releases にアップロードする。
  # ============================================================
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    outputs:
      model_version: ${{ steps.version.outputs.model_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.train_start_year }}-${{ inputs.train_start_month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.train_start_year }}-${{ inputs.train_start_month }}-
            kbfile-${{ inputs.train_start_year }}-

      - name: "Train model (Session 5: Temperature Scaling)"
        run: python ml/src/scripts/run_retrain.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRAIN_START_YEAR: ${{ inputs.train_start_year }}
          TRAIN_START_MONTH: ${{ inputs.train_start_month }}

      - name: Read model version
        id: version
        run: |
          VERSION=$(cat artifacts/model_version.txt)
          echo "model_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Model version: ${VERSION}"

      - name: Read model metrics
        id: metrics
        run: |
          echo "metrics<<EOF" >> $GITHUB_OUTPUT
          cat artifacts/model_metrics.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create model_latest.pkl
        run: |
          VERSION=$(cat artifacts/model_version.txt)
          cp "artifacts/model_${VERSION}.pkl" artifacts/model_latest.pkl
          echo "Copied model_${VERSION}.pkl → model_latest.pkl"

      - name: Upload model artifact (calibration ジョブ用)
        id: upload_model
        uses: actions/upload-artifact@v4
        with:
          name: model-session5-${{ steps.version.outputs.model_version }}
          path: |
            artifacts/model_latest.pkl
            artifacts/model_version.txt
            artifacts/model_metrics.txt
          retention-days: 7

      - name: Upload model to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ steps.version.outputs.model_version }}-s5-run${{ github.run_number }}
          name: "Session 5 Model ${{ steps.version.outputs.model_version }} (#${{ github.run_number }})"
          body: |
            ## Session 5 学習済みモデル

            **変更点**: Temperature Scaling キャリブレーション（sum-to-1 維持）

            ```
            ${{ steps.metrics.outputs.metrics }}
            ```

            **Temperature Scaling パラメータ**: モデル pkl 内の `temperature` キーを参照

            - Pipeline: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Branch: `${{ github.ref_name }}`
          files: |
            artifacts/model_*.pkl
            artifacts/model_metrics.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload retrain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-session5-${{ steps.version.outputs.model_version }}-run${{ github.run_number }}
          path: |
            artifacts/model_*.pkl
            artifacts/model_version.txt
            artifacts/model_metrics.txt
          retention-days: 90

  # ============================================================
  # Job 2: キャリブレーション分析
  #   retrain モデルで 1着 ECE を計測。
  #   目標: Temperature Scaling により 1着 ECE を 0.05 以下に改善できているか確認。
  # ============================================================
  calibration:
    needs: retrain
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Download model from retrain job
        uses: actions/download-artifact@v4
        with:
          name: model-session5-${{ needs.retrain.outputs.model_version }}
          path: artifacts/

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.cal_year }}-${{ inputs.cal_month }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.cal_year }}-${{ inputs.cal_month }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.cal_year }}-${{ inputs.cal_month }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.cal_year }}-${{ inputs.cal_month }}-

      - name: Run calibration analysis
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi
          python ml/src/scripts/run_calibration.py \
            --year ${{ inputs.cal_year }} \
            --month ${{ inputs.cal_month }} \
            $REAL_ODDS_FLAG

      - name: Show calibration summary
        if: always()
        run: |
          echo "=== Calibration Summary (Session 5 Temperature Scaling) ==="
          MONTH_PAD=$(printf "%02d" ${{ inputs.cal_month }})
          SUMMARY="artifacts/calibration_${{ inputs.cal_year }}${MONTH_PAD}_summary.csv"
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY"
          else
            echo "Summary file not found: $SUMMARY"
          fi

      - name: Upload calibration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-session5-${{ inputs.cal_year }}-${{ inputs.cal_month }}-run${{ github.run_number }}
          path: artifacts/calibration_*.csv
          retention-days: 90

  # ============================================================
  # Job 3: Walk-Forward バックテスト（S5-3）
  #   新フィルタ（prob≥7%, EV≥2.0, コース2/4/5除外, オッズ≥100x, びわこ除外）で
  #   2025-10〜12 を Walk-Forward（各月再学習）。
  #   Session 3 ROI (+515%) を上回れるか検証する。
  # ============================================================
  walkforward:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y lhasa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Restore K/B file cache
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/program/
          key: kbfile-${{ inputs.wf_start }}-${{ inputs.wf_end }}-${{ github.run_id }}
          restore-keys: |
            kbfile-${{ inputs.wf_start }}-${{ inputs.wf_end }}-
            kbfile-${{ inputs.wf_start }}-

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/odds/
          key: odds-${{ inputs.wf_start }}-${{ inputs.wf_end }}-${{ github.run_id }}
          restore-keys: |
            odds-${{ inputs.wf_start }}-${{ inputs.wf_end }}-
            odds-${{ inputs.wf_start }}-
            odds-

      - name: "Run Walk-Forward (Session 5: 新フィルタ + Temperature Scaling)"
        run: |
          REAL_ODDS_FLAG=""
          if [ "${{ inputs.real_odds }}" == "true" ]; then
            REAL_ODDS_FLAG="--real-odds"
          fi

          # exclude_courses / exclude_stadiums はスペース区切り文字列をそのまま展開
          EXCLUDE_COURSES_FLAG=""
          if [ -n "${{ inputs.exclude_courses }}" ]; then
            EXCLUDE_COURSES_FLAG="--exclude-courses ${{ inputs.exclude_courses }}"
          fi

          MIN_ODDS_FLAG=""
          if [ -n "${{ inputs.min_odds }}" ]; then
            MIN_ODDS_FLAG="--min-odds ${{ inputs.min_odds }}"
          fi

          EXCLUDE_STADIUMS_FLAG=""
          if [ -n "${{ inputs.exclude_stadiums }}" ]; then
            EXCLUDE_STADIUMS_FLAG="--exclude-stadiums ${{ inputs.exclude_stadiums }}"
          fi

          python ml/src/scripts/run_walkforward.py \
            --start "${{ inputs.wf_start }}" \
            --end "${{ inputs.wf_end }}" \
            --retrain \
            --train-start-year ${{ inputs.train_start_year }} \
            --train-start-month ${{ inputs.train_start_month }} \
            --prob-threshold ${{ inputs.prob_threshold }} \
            --ev-threshold ${{ inputs.ev_threshold }} \
            --max-bets ${{ inputs.max_bets }} \
            $REAL_ODDS_FLAG \
            $EXCLUDE_COURSES_FLAG \
            $MIN_ODDS_FLAG \
            $EXCLUDE_STADIUMS_FLAG

      - name: Upload Walk-Forward results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkforward-session5-${{ inputs.wf_start }}-${{ inputs.wf_end }}-run${{ github.run_number }}
          path: |
            artifacts/walkforward_*.csv
            artifacts/model_*.pkl
            data/odds/odds_*.parquet
          retention-days: 90
