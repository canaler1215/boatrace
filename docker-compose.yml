services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: boatrace
      POSTGRES_PASSWORD: boatrace
      POSTGRES_DB: boatrace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/web/lib/db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boatrace -d boatrace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
