# 戦略パラメータ設定ファイル（デフォルト / Session 6 現行ルール）
#
# このファイルは auto-loop agent が書き換え可能な唯一のパラメータ設定です。
# 変更履歴はコミットメッセージと kpi_history.jsonl で管理してください。
#
# 参考: BET_RULE_REVIEW_202509_202512.md、CLAUDE.md「購入条件」セクション

version: "1.0"
description: "Session 6 現行ルール（2025-09〜12 実オッズ検証ベース）"

# ── 購入フィルタ ──────────────────────────────────────────────
filters:
  # 3連単確率閾値（この値以上のみ購入）
  prob_threshold: 0.07          # 7%

  # 期待値閾値（EV = P_model × odds、この値以上のみ購入）
  ev_threshold: 2.0

  # 除外する1着艇番（コースフィルタ）
  # コース4/5除外は逆効果との検証結果あり → 要継続監視
  exclude_courses:
    - 2

  # 購入するオッズの下限（倍）。この値未満は除外
  min_odds: 100.0

  # 除外する場ID（びわこ = 11）
  exclude_stadiums:
    - 11

# ── 賭け金管理 ────────────────────────────────────────────────
staking:
  # 1点あたりの固定賭け金（円）
  bet_amount: 100

  # 最大賭け点数（1レースあたり）
  max_bets: 5

  # Kelly 分率（0.0 = 固定ベット、0.25 = 1/4 Kelly）
  kelly_fraction: 0.0

  # Kelly 計算用の資金額（円）
  kelly_bankroll: 100000

# ── 賭式 ─────────────────────────────────────────────────────
bet_type: "trifecta"            # trifecta=3連単 / trio=3連複 / both=両方

# ── 学習設定 ─────────────────────────────────────────────────
training:
  train_start_year: 2023
  train_start_month: 1
